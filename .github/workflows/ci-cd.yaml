# .github/workflows/ci-cd.yml
name: CI-CD to EKS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  EKS_CLUSTER_NAME: rimo-restauranty
  K8S_NAMESPACE: restauranty

  DOCKERHUB_USERNAME: rimo9docker

  AUTH_IMAGE: rimo9docker/rimo-restauranty-auth
  DISCOUNTS_IMAGE: rimo9docker/rimo-restauranty-discounts
  ITEMS_IMAGE: rimo9docker/rimo-restauranty-items
  CLIENT_IMAGE: rimo9docker/rimo-restauranty-client

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/auth/Dockerfile
          push: true
          tags: |
            ${{ env.AUTH_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.AUTH_IMAGE }}:latest

      - name: Build and push discounts image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/discounts/Dockerfile
          push: true
          tags: |
            ${{ env.DISCOUNTS_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.DISCOUNTS_IMAGE }}:latest

      - name: Build and push items image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/items/Dockerfile
          push: true
          tags: |
            ${{ env.ITEMS_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.ITEMS_IMAGE }}:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.CLIENT_IMAGE }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Ensure namespace exists
        run: kubectl get ns "$K8S_NAMESPACE" || kubectl create namespace "$K8S_NAMESPACE"

      - name: Create or update MongoDB secret
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret generic mongo-secret \
            --from-literal=MONGO_URI="${{ secrets.MONGODB_URI }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ -n "$K8S_NAMESPACE"

      - name: Update deployment images
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/auth-deployment auth=${AUTH_IMAGE}:${IMAGE_TAG}
          kubectl -n "$K8S_NAMESPACE" set image deployment/discounts-deployment discounts=${DISCOUNTS_IMAGE}:${IMAGE_TAG}
          kubectl -n "$K8S_NAMESPACE" set image deployment/items-deployment items=${ITEMS_IMAGE}:${IMAGE_TAG}
          kubectl -n "$K8S_NAMESPACE" set image deployment/frontend-deployment frontend=${CLIENT_IMAGE}:${IMAGE_TAG}

      - name: Wait for rollout
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/auth-deployment --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/discounts-deployment --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/items-deployment --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/frontend-deployment --timeout=180s

      - name: Show service and ingress status
        run: |
          kubectl get pods -n "$K8S_NAMESPACE"
          kubectl get svc -n "$K8S_NAMESPACE"
          kubectl get ingress -n "$K8S_NAMESPACE"
