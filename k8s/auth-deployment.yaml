apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: rimo9docker/rimo-restauranty-auth:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: SECRET
              value: "MySecret1!"
            - name: MONGODB_URI
              value: "mongodb+srv://mongo-user:Berlin09@mongodb.plxma3m.mongodb.net/resturanty?retryWrites=true&w=majority"
            - name: CLOUD_NAME
              value: "dummy"
            - name: CLOUD_API_KEY
              value: "dummy"
            - name: CLOUD_API_SECRET
              value: "dummy"
