apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: items
  template:
    metadata:
      labels:
        app: items
    spec:
      containers:
        - name: items
          image: rimo9docker/rimo-restauranty-items:latest
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: SECRET
              value: "MySecret1!"
            - name: MONGODB_URI
              valueFrom:
              secretKeyRef:
                name: mongo-secret
                key: MONGO_URI
            - name: CLOUD_NAME
              value: "dummy"
            - name: CLOUD_API_KEY
              value: "dummy"
            - name: CLOUD_API_SECRET
              value: "dummy"
